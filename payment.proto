syntax = "proto3";

package payment;

option go_package = "github.com/Nuray06-1/proto-generated/payment";

service PaymentService {
  rpc ProcessPayment (PaymentRequest) returns (PaymentResponse);
}

message PaymentRequest {
  string order_id = 1;
  int64 amount = 2;
}

message PaymentResponse {
  string status = 1;
}
